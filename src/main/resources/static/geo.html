<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <title>Restaurant Locator</title>

    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>

<body style="background-color:#E5E7E9;">

<div class="container mt-5">
    <h2>Restaurant Locator</h2>

    <div class="row">
        <div class="col">
            <input type="text" class="form-control" placeholder="Enter the zip code" id="zip">
        </div>
        <div class="col">
            <button type="button" class="btn btn-primary form-control" id="search">
                Search
            </button>
        </div>
    </div>

    <div id="map" class="mt-5"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let map;
    let markers = [];

    function initMap() {
        // Default view (centered world view)
        map = L.map('map').setView([20, 78], 4);

        // OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        document.getElementById('search').addEventListener('click', updateMap);
    }

    async function updateMap() {
        const zip = document.getElementById('zip').value;
        const uri = `http://localhost:8080/geo/${zip}`;

        const response = await fetch(uri);
        const arr = await response.json();

        // clear old markers
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        if (arr.length > 0) {
            map.setView([arr[0].latitude, arr[0].longitude], 12);
        }

        arr.forEach(r => {
            const marker = L.marker([r.latitude, r.longitude])
                .addTo(map)
                .bindPopup(`<b>${r.name}</b>`);

            markers.push(marker);
        });
    }

    initMap();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
